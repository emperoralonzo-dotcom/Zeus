name: Build Zeus APK

# Builds an installable (debug-signed) APK in GitHub's cloud — no PC or Android Studio needed.
# After it runs: open the run → Artifacts → download "zeus-apk" → install the .apk on your phone.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # also lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: zeus-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
